<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakfast Cafe - The #1 Healthy Restaurant</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <img src="images/quenn logo.png" alt="Breakfast Cafe Logo">
            </div>
            <nav class="nav" id="main-nav">
                <ul class="nav-list">
                    <li><a href="#home" class="nav-link active">Home</a></li>
                    <li><a href="#menu" class="nav-link">Menu</a></li>
                    <li><a href="#about" class="nav-link">About</a></li>
                    <li><a href="#gallery" class="nav-link">Gallery</a></li>
                    <li><a href="#contact" class="nav-link">Contact</a></li>
                </ul>
                <div class="hamburger" id="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>
    
    <!-- Gallery -->
    <section id="gallery" class="gallery">
        <div class="container">
            <h2 class="section-title">Our Delicious Dishes</h2>
            <div class="gallery-grid">
                <img src="images/food5.jpg.png" alt="Dish 1">
                <img src="images/food6.jpg.png" alt="Dish 2">
                <img src="images/food7.jpg.png" alt="Dish 3">
                <img src="images/food8.jpg.png" alt="Dish 4">
                <img src="images/food9.jpg.png" alt="Dish 5">
                <img src="images/food10.jpg.png" alt="Dish 6">
                <img src="images/food11.jpg.png" alt="Dish 7">
                <img src="images/food12.jpg.png" alt="Dish 8">
            </div>
        </div>
    </section>

     <!-- Team -->
    <section class="team">
        <div class="container">
            <h2 class="section-title">Our Chefs</h2>
            <div class="team-grid">
                <div class="team-member">
                    <img src="images/chief1.png.png" alt="Chef 1">
                </div>
                <div class="team-member">
                    <img src="images/chief2.png.png" alt="Chef 2">
                </div>
                <div class="team-member">
                    <img src="images/chief3.png.png" alt="Chef 3">
                </div>
                <div class="team-member">
                    <img src="images/chief4.png.png" alt="Chef 4">
                </div>
            </div>
            <div class="offer">
                <img src="images/offer.png" alt="Special Offer">
            </div>
        </div>
    </section>
